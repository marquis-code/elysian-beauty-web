# ---
# deployment:
#   tasks:
#     - export DEPLOYPATH=/home/elysgohr/public_html/
#     # Copy all built files from .output/public
#     - /bin/cp -R .output/public/* $DEPLOYPATH/
#     # Fallback: If index.html doesn't exist, copy 200.html to index.html
#     - test -f $DEPLOYPATH/index.html || /bin/cp $DEPLOYPATH/200.html $DEPLOYPATH/index.html 2>/dev/null || true

---
deployment:
  tasks:
    - export DEPLOYPATH=/home/elysgohr/public_html/
    - export NODEJS_VERSION=18
    # Install dependencies and build
    - /usr/bin/npm install
    - /usr/bin/npm run build
    # Copy built files to public_html root
    - /bin/cp -R .output/public/* $DEPLOYPATH/