---
deployment:
  tasks:
    - export DEPLOYPATH=/home/elysgohr/public_html/
    - export NODE_VERSION=18
    
    # Clean deployment directory (keep .well-known and cgi-bin)
    - find $DEPLOYPATH -mindepth 1 -maxdepth 1 ! -name '.well-known' ! -name 'cgi-bin' ! -name '.htaccess' -exec rm -rf {} +
    
    # Install dependencies
    - /usr/bin/npm install --production=false
    
    # Build the Nuxt application
    - /usr/bin/npm run build
    
    # Copy ONLY the built static files from .output/public
    - /bin/cp -R .output/public/* $DEPLOYPATH/
    
    # Create .htaccess for SPA routing
    - |
      cat > $DEPLOYPATH/.htaccess << 'EOF'
      RewriteEngine On
      RewriteBase /
      DirectoryIndex index.html
      
      # Don't rewrite files or directories that exist
      RewriteCond %{REQUEST_FILENAME} !-f
      RewriteCond %{REQUEST_FILENAME} !-d
      
      # For all other requests, serve index.html
      RewriteRule . /index.html [L]
      
      # Prevent directory browsing
      Options -Indexes
      
      # Enable compression
      <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript application/javascript application/json
      </IfModule>
      
      # Cache static assets
      <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType image/jpg "access plus 1 year"
        ExpiresByType image/jpeg "access plus 1 year"
        ExpiresByType image/gif "access plus 1 year"
        ExpiresByType image/png "access plus 1 year"
        ExpiresByType image/webp "access plus 1 year"
        ExpiresByType text/css "access plus 1 month"
        ExpiresByType application/javascript "access plus 1 month"
        ExpiresByType application/x-javascript "access plus 1 month"
        ExpiresByType text/javascript "access plus 1 month"
      </IfModule>
      EOF